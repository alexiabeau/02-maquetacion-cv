<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portafolio - Alexia</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
<div class="page-wrap">

<header>
    <div class="header-image" aria-label="Logotipo o imagen de título"></div>
    <h1>Mis trabajos</h1>
</header>

<!-- MODELADO -->
<section>
    <h2>Modelado 3D</h2>

    <div class="galeria">
        <div class="trabajo">
            <img src="img/modelo1.jpg">
            <p>Render en Blender</p>
        </div>

        <div class="trabajo">
            <img src="img/modelo2.jpg">
            <p>Texturizado</p>
        </div>
    </div>
</section>

<!-- ILUSTRACIONES -->
<section>
    <h2>Ilustraciones</h2>

    <div class="galeria">
        <div class="trabajo">
            <a href="img/pip.jpg" target="_blank" rel="noopener noreferrer">
              <img src="img/pip.jpg" alt="Pip">
            </a>
            <p>Comisión de personaje</p>
        </div>

        <div class="trabajo">
            <a href="img/starfire.jpg" target="_blank" rel="noopener noreferrer">
              <img src="img/starfire.jpg" alt="Starfire">
            </a>
            <p>Dibujo digital de personaje animado</p>
        </div>
    </div>
</section>

<!-- DISEÑO -->
<section>
    <h2>Diseño</h2>

    <div class="galeria">
        <div class="trabajo">
            <img src="img/diseno1.jpg">
            <p>Póster en Photoshop</p>
        </div>
    </div>
</section>

</div>
</body>
</html>
